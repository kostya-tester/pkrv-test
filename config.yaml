  - name: "OrangePi"
    ip: "192.168.243.46"
    username: "orangepi"
    password: ""
    port: 22
    folders: {}
    board:
      type:      "orange_pi"
      can_flash: false
      view_only: true

monitoring:
  check_interval: 5
  ssh_timeout:    10
  auto_reconnect: false

logging:
  level:        "INFO"
  file:         "logs/bench_manager.log"
  max_size:     10485760
  backup_count: 5
  console:      true
  colors:       true

paths:
  downloads: "downloads"
  uploads:   "uploads"
  backups:   "backups"
  scripts:   "scripts"

gui:
  theme:            "dark"
  language:         "ru"
  refresh_interval: 3000
  window_width:     1200
  window_height:    800
