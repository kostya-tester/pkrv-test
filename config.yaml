# ============================================================
# BENCH MANAGER v3.0 — Конфигурация
# ============================================================
# Пароли зашифрованы через Fernet (AES-128-CBC + HMAC-SHA256).
# Для шифрования запустите: python main.py --init-crypto
# Ключ хранится в .bench_key (не коммитить в git!)
# ============================================================

stands:
  - name: "ГОЗ"
    ip: "192.168.243.248"
    username: "pkrv"
    password: "zxcv"          # будет зашифровано после --init-crypto
    port: 22
    folders:
      cvs:    "/home/pkrv/CVS"
      tmp:    "/tmp"
      config: "fpo_cfg"
    board:
      type:        "основная"
      can_flash:   true
      executable:  "1po2_1n"
      config_file: "1po2_1n.cfg"

  - name: "Арктика"
    ip: "192.168.243.249"
    username: "pkrv"
    password: "zxcv"
    port: 22
    folders:
      cvs:    "/home/pkrv/CVS"
      tmp:    "/tmp"
      config: "fpo_cfg"
    board:
      type:        "основная"
      can_flash:   true
      executable:  "1po2_1n"
      config_file: "1po2_1n.cfg"

  - name: "C1M"
    ip: "192.168.243.254"
    username: "pkrv"
    password: "zxcv"
    port: 22
    folders:
      cvs:    "/home/pkrv/CVS"
      tmp:    "/tmp"
      config: "fpo_cfg"
    board:
      type:        "основная"
      can_flash:   true
