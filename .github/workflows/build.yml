name: Build & Release BenchManager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 paramiko pyyaml pillow cryptography psutil scp

      - name: Convert logo to ICO
        shell: python
        run: |
          from PIL import Image
          img = Image.open('gui/images/logo.png').convert('RGBA')
          img.save('gui/images/logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          print('ICO created OK')

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name "BenchManager" ^
            --add-data "gui/images;gui/images" ^
            --add-data "config.yaml;." ^
            --icon "gui/images/logo.ico" ^
            --collect-submodules paramiko ^
            --collect-submodules yaml ^
            --collect-submodules cryptography ^
            main.py

      - name: Verify build
        shell: cmd
        run: |
          if exist dist\BenchManager.exe (
            echo BUILD OK
            dir dist\BenchManager.exe
          ) else (
            echo BUILD FAILED - EXE not found
            exit /b 1
          )

      - name: Get version
        id: version
        shell: cmd
        run: echo version=%GITHUB_REF_NAME% >> %GITHUB_OUTPUT%

      - name: Pack ZIP
        shell: cmd
        run: |
          mkdir release
          copy dist\BenchManager.exe release\BenchManager.exe
          copy config.yaml release\config.yaml
          copy README.md release\README.md
          cd release
          powershell Compress-Archive -Path * -DestinationPath ..\BenchManager-windows-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: BenchManager ${{ steps.version.outputs.version }}
          files: BenchManager-windows-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BenchManager-Windows
          path: dist/BenchManager.exe
          retention-days: 30
